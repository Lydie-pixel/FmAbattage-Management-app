<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Page d'accueil</title>

        <link href="asset/img/favicon/favicon.png" rel="icon">
        <link href="asset/css/style.css" rel="stylesheet">
        <link href="asset/css/index.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    </head>

    <body>
        <div id="header"></div>
        <main class="dashboard">
            <h1>Tableau de bord</h1>
            <div class="dashboard-grid">
                <div class="dashboard-card" id="paiements"></div>
                <div class="dashboard-card" id="devis"></div>
            
                <div class="quick-actions">

                    <a href="#"
                    onclick="openCreateClientModal()"
                    class="quick-action">
                        <i class="bi bi-person-plus"></i>
                        Nouveau client
                    </a>

                    <div class="modal fade" id="clientModal" tabindex="-1">
                        <div class="modal-dialog">
                            <div class="modal-content">

                                <div class="modal-header">
                                    <h5 class="modal-title" id="modalTitle">Nouveau client</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>

                                <div class="modal-body">
                                    <form id="clientForm">
                                        <input type="hidden" id="clientId">

                                        <div class="mb-2">
                                            <label>Nom</label>
                                            <input type="text" id="nom" class="form-control" required>
                                        </div>

                                        <div class="mb-2">
                                            <label>Téléphone</label>
                                            <input type="text" id="tel" class="form-control">
                                        </div>

                                        <div class="mb-2">
                                            <label>Email</label>
                                            <input type="email" id="email" class="form-control" required>
                                        </div>

                                        <div class="mb-2">
                                            <label>Adresse</label>
                                            <input type="text" id="adresse" class="form-control">
                                        </div>

                                        <div class="mb-2">
                                            <label>Ville</label>
                                            <input type="text" id="ville" class="form-control">
                                        </div>

                                        <div class="mb-2">
                                            <label>Code postal</label>
                                            <input type="text" id="code_postal" class="form-control">
                                        </div>
                                    </form>
                                </div>

                                <div class="modal-footer">
                                    <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                                    <button class="btn btn-primary" onclick="saveClient()">Enregistrer</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <a href="/pages/CreeDevis.html"
                    class="quick-action">
                        <i class="bi bi-file-earmark-plus"></i>
                        Nouveau devis
                    </a>

                    <a href="#"
                    onclick="openCreateFactureModal()"
                    class="quick-action">
                        <i class="bi bi-receipt"></i>
                        Nouvelle facture
                    </a>

                    <div class="modal fade" id="factureModal">
                        <div class="modal-dialog">
                            <div class="modal-content">

                                <div class="modal-header">
                                    <h5 class="modal-title">
                                    Créer une facture
                                    </h5>

                                    <button
                                    type="button"
                                    class="btn-close"
                                    data-bs-dismiss="modal">
                                    </button>
                                </div>

                                <div class="modal-body">

                                    <select
                                    id="devisSelect"
                                    class="form-select mb-3">
                                    </select>

                                    <input
                                    type="number"
                                    id="fraisFinal"
                                    class="form-control"
                                    placeholder="Frais de carburant final">
                                </div>

                                <div class="modal-footer">
                                    <button class="btn btn-secondary"data-bs-dismiss="modal">Annuler</button>
                                    <button class="btn btn-success" onclick="saveFacture()">Créer</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <a href="#"
                    onclick="openCreatePaiementModal()"
                    class="quick-action">
                        <i class="bi bi-cash-stack"></i>
                        Nouveau paiement
                    </a>

                    <div class="modal fade" id="paieModal">
                        <div class="modal-dialog">
                            <div class="modal-content">

                                <div class="modal-header">
                                    <h5 class="modal-title">Ajouter un paiement</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>

                                <div class="modal-body">

                                    <form id="paieForm">

                                        <select id="facture_id" class="form-select mb-3"></select>

                                        <input 
                                            type="number"
                                            id="montant"
                                            class="form-control mb-3"
                                            placeholder="Montant">

                                        <input 
                                            type="date"
                                            id="date_paiement"
                                            class="form-control mb-3">

                                        <select id="mode_paiement" class="form-select">
                                            <option value="virement_A">Virement compte A</option>
                                            <option value="virement_B">Virement compte B</option>
                                            <option value ="cb">Carte bancaire</option>
                                            <option value="cheque">Chèque</option>
                                            <option value="especes">Espèces</option>
                                            <option value="autre">Autre</option>
                                        </select>
                                    </form>
                                </div>

                                <div class="modal-footer">
                                    <button type="button"class="btn btn-danger"data-bs-dismiss="modal">Annuler</button>
                                    <button type="button" class="btn btn-success"onclick="savePaiement()">Valider</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <a href="#"
                    onclick="openCreateDepenseModal()"
                    class="quick-action">
                        <i class="bi bi-wallet2"></i>
                        Nouvelle dépense
                    </a>

                    <div class="modal fade" id="depenseModal">
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5>Ajouter une dépense</h5>
                                </div>

                                <div class="modal-body">
                                    <input type="date" id="date" class="form-control mb-2">
                                    
                                    <select id="type" class="form-control mb-2">
                                        <option value="frais_carburant">Carburant</option>
                                        <option value="frais_materiel">Matériel</option>
                                        <option value="charges">Charges</option>
                                        <option value="autre">Autre</option>
                                    </select>

                                    <input type="text" id="description" placeholder="Description" class="form-control mb-2">
                                    <input type="number" id="montant" placeholder="Montant" class="form-control">
                                </div>

                                <div class="modal-footer">
                                    <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                                    <button class="btn btn-success" onclick="saveDepense()">Valider</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <a href="/pages/creeRelance.html"
                    class="quick-action">
                        <i class="bi bi-envelope-paper"></i>
                        Nouvelle relance
                    </a>
                </div>
            </div>
        </main>
        <div id="footer"></div>
    </body>
    <script type="module" src="asset/js/payements/PaiementEnAttente.js"></script>
    <script src="asset/js/dashboardModals.js"></script>
    <script src="asset/js/devis/DevisEnAttente.js"></script> 
    <script src="asset/js/componement.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>

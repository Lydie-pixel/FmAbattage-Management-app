<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nouveau devis</title>

        <link href="/asset/img/favicon/favicon.png" rel="icon">
        <link href="../asset/css/style.css" rel="stylesheet">
        <link href="../asset/css/devis.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    </head>

    <body>
        <div id="header"></div>

        <main>
            <h1>Créer un nouveau devis</h1>
            <div class="devis-layout">

                <!-- Partie gauche -->
                <div class="devis-form-card">
                    <h2>Créer un devis</h2>

                    <button type="button" class="btn btn-secondary mb-3" onclick="openCreateModal()">
                        + Nouveau client
                    </button>

                    
                    <div class="modal fade" id="clientModal" tabindex="-1">
                        <div class="modal-dialog">
                            <div class="modal-content">

                                <div class="modal-header">
                                    <h5 class="modal-title" id="modalTitle">Nouveau client</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>

                                <div class="modal-body">
                                    <form id="clientForm">
                                        <input type="hidden" id="clientId">

                                        <div class="mb-2">
                                            <label>Nom</label>
                                            <input type="text" id="nom" class="form-control" required>
                                        </div>

                                        <div class="mb-2">
                                            <label>Téléphone</label>
                                            <input type="text" id="tel" class="form-control">
                                        </div>

                                        <div class="mb-2">
                                            <label>Email</label>
                                            <input type="email" id="email" class="form-control" required>
                                        </div>

                                        <div class="mb-2">
                                            <label>Adresse</label>
                                            <input type="text" id="adresse" class="form-control">
                                        </div>

                                        <div class="mb-2">
                                            <label>Ville</label>
                                            <input type="text" id="ville" class="form-control">
                                        </div>

                                        <div class="mb-2">
                                            <label>Code postal</label>
                                            <input type="text" id="code_postal" class="form-control">
                                        </div>
                                    </form>
                                </div>

                                <div class="modal-footer">
                                    <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                                    <button class="btn btn-primary" onclick="saveClient()">Enregistrer</button>
                                </div>

                            </div>
                        </div>
                    </div>

                    <form id="devisForm">

                        <!-- CLIENT -->
                        <div class="form-section">
                            <label>Client</label>
                            <select id="client" class="form-control"></select>
                        </div>

                        <!-- DATES -->
                        <div class="form-grid">
                            <div>
                                <label>Date devis</label>
                                <input type="date" id="date_devis" class="form-control">
                            </div>

                            <div>
                                <label>Date échéance</label>
                                <input type="date" id="date_echeance" class="form-control">
                            </div>
                        </div>

                        <!-- frais -->
                        <label>Frais de carburant</label>
                        <input type="number" id="frais" value="0" oninput="updateTotals()">

                        <!-- items -->
                        <div class="form-section">
                            <h4>Lignes</h4>
                            <div id="items"></div>

                            <button type="button" class="btn btn-outline-primary mt-3" onclick="addItem()">
                                + Ajouter une ligne
                            </button>
                        </div>

                            <br><br>
                        <div class="form-actions">
                            <button 
                                type="button" 
                                class="btn btn-danger"
                                onclick="window.location.href='/pages/devis.html'">
                                Annuler
                            </button>

                            <button type="submit" class="btn btn-success">
                                Créer le devis
                            </button>
                        </div>

                    </form>
                </div>
                <div class="total-card">

                    <h3>Total du devis</h3>
                    <div id="totalGlobal">
                        0 €
                    </div>
                </div>

            </div>
        </main>
        <div id="footer"></div>

    </body>
    <script src="/asset/js/componement.js"></script>
    <script src="/asset/js/devis/commonDevis.js"></script>
    <script src="/asset/js/devis/CreeDevis.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>

<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dépenses</title>

        <link href="/asset/img/favicon/favicon.png" rel="icon">
        <link href="../asset/css/style.css" rel="stylesheet">
        <link href="../asset/css/table.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    </head>

    <body>
        <div id="header"></div>

        <main>
            <div class="page-header">
                <div>
                    <h1>Dépenses</h1>
                </div>
                <div class="card-cell"> 
                    <button class="btn btn-primary" onclick="openCreateDepenseModal()">
                        Ajouter une dépense
                    </button>
                    <select 
                        id="yearFilter" class="form-select w-auto mb-3" onchange="loadDepenses()">
                    </select>
                </div>
            </div>
                <div 
                    id="depenseTable">
                </div>

            <div class="modal fade" id="depenseModal">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5>Ajouter une dépense</h5>
                        </div>

                        <div class="modal-body">
                            <input type="date" id="date" class="form-control mb-2">
                            
                            <select id="type" class="form-control mb-2">
                                <option value="frais_carburant">Carburant</option>
                                <option value="frais_materiel">Matériel</option>
                                <option value="charges">Charges</option>
                                <option value="autre">Autre</option>
                            </select>

                            <input type="text" id="description" placeholder="Description" class="form-control mb-2">
                            <input type="number" id="depense_montant" placeholder="Montant" class="form-control">
                        </div>

                        <div class="modal-footer">
                            <button class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                            <button class="btn btn-success" onclick="saveDepense()">Valider</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        
        <div id="footer"></div>
    </body>
    <script src="/asset/js/helpers/modals.js"></script>
    <script type="module" src="/asset/js/depenses/TableDepense.js"></script>
    <script src="/asset/js/componement.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>

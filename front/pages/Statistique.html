<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Statistiques</title>

        <link href="/asset/img/favicon/favicon.png" rel="icon">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
        <link href="../asset/css/style.css" rel="stylesheet">
        <link href="../asset/css/stats.css" rel="stylesheet">
    
    </head>

    <body>
        <div id="header"></div>

        <main class="stats-page">
            <div class="page-header">
                <h1>Tableau de statistiques</h1>

                <div class="card-cell">
                
                    <div class="d-flex gap-2 mb-4">
                    <!-- Séléction de l'année-->
                    <select id="year" class="form-select w-auto"></select>
                    <!-- Séléction du mois-->
                    <select id="month" class="form-select w-auto">
                    <option value="">Toute l'année</option>
                    <option value="1">Janvier</option>
                    <option value="2">Février</option>
                    <option value="3">Mars</option>
                    <option value="4">Avril</option>
                    <option value="5">Mai</option>
                    <option value="6">Juin</option>
                    <option value="7">Juillet</option>
                    <option value="8">Août</option>
                    <option value="9">Septembre</option>
                    <option value="10">Octobre</option>
                    <option value="11">Novembre</option>
                    <option value="12">Décembre</option>
                    </select>

                    <button class="btn btn-primary" onclick="reloadAll()">Filtrer</button>
                    </div>
                </div>
            </div>

                
            <!-- CARDS PRINCIPALES -->
            <div class="stats-grid">

                <div class="stats-card center-card">
                    <div class="stats-header">
                        <h5>Factures</h5>
                        <div class="icon-box icon-facture">
                            <i class="bi bi-file-earmark-text"></i>
                        </div>
                    </div>
                    <p>Facturé : <strong id="ca">0 €</strong></p>
                    <p>Payé : <strong id="paye">0 €</strong></p>
                    <p>En attente : <strong id="attente">0 €</strong></p>
                </div>

                <div class="stats-card center-card">
                    <div class="stats-header">
                        <h5>Résultat</h5>
                        <div class="icon-box icon-resultat">
                            <i class="bi bi-graph-up-arrow"></i>
                        </div>
                    </div>
                    <h2 id="benefice">0 €</h2>
                </div>

                <div class="stats-card center-card">
                    <div class="stats-header">
                        <h5>Dépenses</h5>
                        <div class="icon-box icon-depenses">
                            <i class="bi bi-cash-coin"></i>
                        </div>
                    </div>

                    <h2 id="depenses">0 €</h2>
                </div>
            </div>

            <!-- BAS DE PAGE -->
            <div class="stats-bottom">

                <!-- TABLEAU -->
                <div class="stats-table-card">
                    <div class="stats-header">
                        <h3>Paiements en attente</h3>
                        <div class="icon-box icon-paiement">
                            <i class="bi bi-clock"></i>
                        </div>
                    </div>
                    <div id="paiements"></div>
                </div>

                <!-- DETAILS DEPENSES -->
                <div class="depenses-side">
                    <div id="depenseByType"></div>
                </div>
            </div>
        </main>
        
        <div id="footer"></div>
    </body>
    <script type="module" src="/asset/js/depenses/Statistique.js"></script>
    <script type="module" src="/asset/js/componement.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>

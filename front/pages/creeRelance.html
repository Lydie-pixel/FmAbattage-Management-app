<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nouvelle relance</title>

        <link href="../asset/img/favicon/favicon.png" rel="icon">
        <link href="../asset/css/style.css" rel="stylesheet">
        <link href="../asset/css/table.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    </head>

    <body>
        <div id="header"></div>

        <main>
            <div class="container mt-4">

            <h2>Nouvelle relance</h2>

            <!-- Sélection facture -->
            <div class="mb-3">
                <label class="form-label">
                Facture
                </label>

                <select
                id="facture_id"
                class="form-select">
                <option value="">
                    Sélectionner une facture
                </option>
                </select>
            </div>

            <!-- Infos facture/client -->
            <div id="factureInfos"></div>

            <!-- Historique -->
            <div id="historiqueRelances"></div>

            <!-- Formulaire -->
            <form id="relanceForm">

                <div class="mb-3">
                <label class="form-label">
                    Niveau de la relance
                </label>

                <select
                    id="niveau"
                    class="form-select">

                    <option value="relance_1">
                    Première relance
                    </option>

                    <option value="relance_2">
                    Deuxième relance
                    </option>

                    <option value="relance_3">
                    Troisième relance
                    </option>

                    <option value="mise_en_demeure">
                    Mise en demeure
                    </option>

                </select>
                </div>

                <div class="mb-3">
                <label class="form-label">
                    Date de relance
                </label>

                <input
                    type="date"
                    id="date_relance"
                    class="form-control">
                </div>

                <div class="mb-3">
                <label class="form-label">
                    Statut
                </label>

                <select
                    id="statut"
                    class="form-select">

                    <option value="envoyee">
                    Envoyée
                    </option>

                    <option value="payee">
                    Payée
                    </option>

                    <option value="procedure">
                    En procédure
                    </option>

                    <option value="annulee">
                    Annulée
                    </option>

                </select>
                </div>

                <div class="mb-3">
                <label class="form-label">
                    Commentaire
                </label>

                <textarea
                    id="commentaire"
                    class="form-control"></textarea>
                </div>

                <!-- Champs mise en demeure -->
                <div id="miseEnDemeureFields">

                <div class="mb-3">
                    <label>Pénalités</label>

                    <input
                    type="number"
                    id="penalites"
                    class="form-control">
                </div>

                <div class="mb-3">
                    <label>Délai avant poursuite</label>

                    <input
                    type="number"
                    id="delai_avant_poursuite"
                    class="form-control">
                </div>

                <div class="mb-3">
                    <label>Numéro AR</label>

                    <input
                    type="text"
                    id="numero_ar"
                    class="form-control">
                </div>

                </div>

                <button
                type="submit"
                class="btn btn-danger">
                Créer la relance
                </button>

            </form>

            </div>
        </main>

        <div id="footer"></div>
    </body>

    <script src="/asset/js/relances/relanceCree.js"></script>
    <script src="/asset/js/componement.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>

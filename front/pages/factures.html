<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Factures</title>

        <link href="/asset/img/favicon/favicon.png" rel="icon">
        <link href="../asset/css/style.css" rel="stylesheet">
        <link href="../asset/css/table.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    </head>

    <body>
        <div id="header"></div>

        <main>
            <div class="page-header">
                    <h1>Tableau de factures</h1>
                <div class="card-cell">
                    <button onclick="openCreateFactureModal()" class="btn btn-primary">
                        Créer une facture
                    </button>
                    <select 
                        id="yearFilter" class="form-select w-auto mb-3" onchange="facture()">
                    </select>
                </div>
            </div>

            <div class="modal fade" id="factureModal">
                <div class="modal-dialog">
                    <div class="modal-content">

                        <div class="modal-header">
                            <h5 class="modal-title">
                            Créer une facture
                            </h5>

                            <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">
                            </button>
                        </div>

                        <div class="modal-body">

                            <select
                            id="devisSelect"
                            class="form-select mb-3">
                            </select>

                            <input
                            type="number"
                            id="fraisFinal"
                            class="form-control"
                            placeholder="Frais de carburant final">
                        </div>

                        <div class="modal-footer">
                            <button class="btn btn-secondary"data-bs-dismiss="modal">Annuler</button>
                            <button class="btn btn-success" onclick="saveFacture()">Créer</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tableFactures"></div>
        </main>
        
        <div id="footer"></div>
    </body>
    <script src="/asset/js/helpers/modals.js"></script>
    <script src="/asset/js/componement.js"></script>
    <script type="module" src="/asset/js/factures/factures.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>

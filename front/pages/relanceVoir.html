<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Voir relance</title>

        <link href="../asset/img/favicon/favicon.png" rel="icon">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
        <link href="../asset/css/style.css" rel="stylesheet">
        <link href="../asset/css/table.css" rel="stylesheet">
        <link href="../asset/css/relance.css" rel="stylesheet">
        
    </head>

    <body>

        <div id="header"></div>

        <main>

            <h2 class="page-title">Détail de la relance</h2>
            <div class="relance-layout">

                <!-- FACTURE -->

                <div class="content-card">

                    <label class="form-label">
                        Facture
                    </label>

                    <div id="factureNumero"
                        class="form-control readonly-field">
                    </div>
                </div>

                <!-- TOP -->

                <div class="top-grid">

                    <div class="content-card info-card">
                        <h5>Infos facture</h5>
                        <div id="factureInfos"></div>
                    </div>

                    <div class="content-card historique-card">
                        <h5>Historique des relances</h5>
                        <div id="historiqueRelances"></div>
                    </div>

                    <div class="content-card actions-card">
                        <button
                            type="button"
                            class="btn btn-primary w-100 mb-2"
                            onclick="window.location.href='/pages/relance.html'">

                            Retour
                        </button>

                        <button
                            type="button"
                            class="btn btn-outline-success w-100"
                            id="pdfButton">

                            <i class="bi bi-file-earmark-pdf"></i>
                            Télécharger PDF
                        </button>
                    </div>
                </div>

                <!-- CHAMPS -->

                <div class="form-grid">
                    <div class="content-card">

                        <label class="form-label">
                            Niveau de la relance
                        </label>

                        <div id="niveau"
                            class="form-control readonly-field">
                        </div>

                    </div>

                    <div class="content-card">
                        <label class="form-label">
                            Date de relance
                        </label>

                        <div id="date_relance"
                            class="form-control readonly-field">
                        </div>
                    </div>

                    <!-- MISE EN DEMEURE -->

                    <div id="miseEnDemeureFields"
                        class="full-width">
                        <div class="mise-grid">

                            <div class="content-card">

                                <label class="form-label">
                                    Pénalités
                                </label>

                                <div id="penalites"
                                    class="form-control readonly-field">
                                </div>

                            </div>

                            <div class="content-card">

                                <label class="form-label">
                                    Délai avant poursuite
                                </label>

                                <div id="delai_avant_poursuite"
                                    class="form-control readonly-field">
                                </div>

                            </div>

                            <div class="content-card ar-field">

                                <label class="form-label">
                                    Numéro AR
                                </label>

                                <div id="numero_ar"
                                    class="form-control readonly-field">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- COMMENTAIRE -->

                    <div class="content-card full-width">

                        <label class="form-label">
                            Commentaire
                        </label>

                        <div id="commentaire"
                            class="form-control readonly-field textarea-like">
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div id="footer"></div>

        <script type="module" src="/asset/js/relances/relanceVoir.js"></script>
        <script src="/asset/js/componement.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    </body>
</html>
